<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>

        .filter-btn{
            margin:10px;
            border:none;
            padding:10px 20px;
            background:#214d33;
            color:white;
            border-radius:30px;
            transition:0.3s;
        }

        .filter-btn:hover{
            background:#ffcc00;
            color:black;
        }

    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">GreenWood</a>
    </div>
</nav>

<section class="container py-5">

    <div class="text-center mb-5">
        <h1>Our Furniture Products</h1>
        <p>Filter products by wood type</p>
    </div>

    <!-- Filter Buttons -->

    <div class="text-center mb-5">
        <button class="filter-btn" onclick="filterProducts('all')">All</button>
        <button class="filter-btn" onclick="filterProducts('teak')">Teak Wood</button>
        <button class="filter-btn" onclick="filterProducts('mango')">Mango Wood</button>
        <button class="filter-btn" onclick="filterProducts('neem')">Neem Wood</button>
        <button class="filter-btn" onclick="filterProducts('jackfruit')">Jack Fruit Wood</button>
        <button class="filter-btn" onclick="filterProducts('mahogany')">Mahogany Wood</button>
    </div>

    <div class="row g-4">

        <!-- Product 1 -->

        <div class="col-md-3 product teak">
            <div class="card product-card">
                <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop" class="card-img-top">

                <div class="card-body">
                    <h5>Teak Wood Cot</h5>
                    <p>6 x 3 Size</p>
                    <h4>₹18,000</h4>
                    <button class="btn btn-success w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->

        <div class="col-md-3 product mango">
            <div class="card product-card">
                <img src="https://images.unsplash.com/photo-1484101403633-562f891dc89a?q=80&w=1200&auto=format&fit=crop" class="card-img-top">

                <div class="card-body">
                    <h5>Mango Wood Cot</h5>
                    <p>6 x 4 Size</p>
                    <h4>₹15,000</h4>
                    <button class="btn btn-success w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->

        <div class="col-md-3 product neem">
            <div class="card product-card">
                <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1000&auto=format&fit=crop" class="card-img-top">

                <div class="card-body">
                    <h5>Neem Wood Cot</h5>
                    <p>6 x 3 Size</p>
                    <h4>₹13,000</h4>
                    <button class="btn btn-success w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 4 -->

        <div class="col-md-3 product jackfruit">
            <div class="card product-card">
                <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1000&auto=format&fit=crop" class="card-img-top">

                <div class="card-body">
                    <h5>Jack Fruit Wood Cot</h5>
                    <p>6 x 4 Size</p>
                    <h4>₹14,500</h4>
                    <button class="btn btn-success w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 5 -->

        <div class="col-md-3 product mahogany mt-4">
            <div class="card product-card">
                <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop" class="card-img-top">

                <div class="card-body">
                    <h5>Mahogany Luxury Cot</h5>
                    <p>Premium Quality</p>
                    <h4>₹25,000</h4>
                    <button class="btn btn-success w-100">Buy Now</button>
                </div>
            </div>
        </div>

    </div>

</section>

<script>

function filterProducts(type){

    let products = document.querySelectorAll('.product');

    products.forEach(function(item){

        if(type === 'all'){
            item.style.display = 'block';
        }
        else if(item.classList.contains(type)){
            item.style.display = 'block';
        }
        else{
            item.style.display = 'none';
        }

    });

}

</script>

</body>
</html>
